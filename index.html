    <script>
      // Always start at top on refresh. Must run synchronously here (before
      // the deferred module bundle) so the browser skips its own restoration.
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      window.scrollTo(0, 0);
    </script>

    <!-- Pre-React scroll lock — iOS Safari ignores scrollRestoration='manual'
         after the first paint and restores its remembered scroll position
         from the previous visit, which made the page open mid-RoomJourney
         instead of at the hero. Locking overflow at HTML parse time (before
         the body even exists in the layout tree) blocks that restoration.
         The LoadingOverlay's onComplete handler removes #nh-prelock. -->
    <style id="nh-prelock">
      html, body { overflow: hidden !important; height: 100%; }
    </style>
